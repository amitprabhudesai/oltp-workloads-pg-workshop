version: '3.8'

services:
  workspace:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ..:/workspace:cached
    command: sleep infinity
    environment:
      PGHOST: postgres
      PGPORT: 5432
      PGDATABASE: workshop
      PGUSER: workshop
      PGPASSWORD: workshop
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16
    restart: unless-stopped
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: workshop
      POSTGRES_USER: workshop
      POSTGRES_PASSWORD: workshop
    # Workshop-tuned config:
    #   - Short checkpoint_timeout so checkpoint effects are visible during exercises
    #   - log_checkpoints / log_lock_waits for observability
    #   - track_io_timing for richer pg_stat views
    #   - wal_level=logical so we can inspect WAL records
    command: >
      postgres
      -c wal_level=logical
      -c synchronous_commit=on
      -c checkpoint_timeout=60
      -c checkpoint_completion_target=0.5
      -c log_checkpoints=on
      -c log_lock_waits=on
      -c log_autovacuum_min_duration=0
      -c track_io_timing=on
      -c track_activities=on
      -c track_counts=on
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U workshop -d workshop"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
